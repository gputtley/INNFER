# Get asimov results
- step: "InitialFit"
  submit: "configs/submit/condor_gpu.yaml"
  run_options: 
    specific_combined_default_val: True
    data_type: "asimov"
    extra_dir_name: "Asimov"
    prune_classifier_models: "roc_auc_test:0.505"
    number_of_integral_events: 100000
    integrate_density_with_ratios: True
    classifier_divide_by_nominal: True

- step: "HessianNumerical"
  submit: "configs/submit/condor_gpu.yaml"
  run_options: 
    specific_combined_default_val: True
    data_type: "asimov"
    extra_dir_name: "Asimov"
    prune_classifier_models: "roc_auc_test:0.505"
    number_of_integral_events: 100000
    integrate_density_with_ratios: True
    classifier_divide_by_nominal: True

- step: "Covariance"
