# Type
type: "BayesFlow"
# coupling design
coupling_design: "interleaved"
permutation: "fixed"
num_coupling_layers: 10
# training
epochs: 1
batch_size: 2048
learning_rate: 0.01
optimizer_name: "AdamW"
lr_scheduler_name: "CosineDecayWithWarmUp"
lr_scheduler_options:
  alpha: 0.000005
  warmup_fraction: 0.1
  step_power: 0.2
active_learning: False
resample: False
gradient_clipping_norm: null
early_stopping: true
patience: 3
tolerance: 0.02
wait_till: 5
# affine or interleaved only
affine_units_per_dense_layer: 128
affine_num_dense_layers: 2
affine_activation: "relu"
affine_dropout: False
affine_dropout_prob: 0.0
# spline or interleaved only
spline_units_per_dense_layer: 256
spline_num_dense_layers: 2
spline_activation: "relu"
spline_dropout: False
spline_dropout_prob: 0.0
spline_bins: 16
